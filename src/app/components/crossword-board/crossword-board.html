    <mat-card class="!bg-slate-50 !rounded-2xl !shadow-sm !border !border-slate-200">
      <mat-card-content class="flex flex-col items-center justify-center p-4 sm:p-8">
        <div class="mb-6 text-center">
          <h2 class="text-3xl font-sans font-bold text-slate-800 tracking-tight">{{ puzzle()?.title }}</h2>
          <div class="text-sm text-slate-500 font-mono mt-2 bg-white px-4 py-1 rounded-full inline-block border border-slate-200">
            Time: {{ formatTime(timeElapsed()) }} | Score: {{ score() }}%
          </div>
        </div>

        @if (activeClue()) {
          <div class="mb-6 p-4 bg-blue-50 border border-blue-100 rounded-xl w-full max-w-md mx-auto text-center shadow-sm">
            <span class="font-bold text-blue-800">{{ activeClue()?.number }}{{ activeClue()?.direction === 'across' ? 'A' : 'D' }}</span>
            <span class="ml-2 text-slate-700">{{ activeClue()?.text }}</span>
          </div>
        }

        <div class="w-full flex justify-center relative">
          <!-- Hidden input to trigger mobile keyboard -->
          <input 
            #hiddenInput
            type="text" 
            class="absolute opacity-0 w-0 h-0 -z-10 caret-transparent text-transparent outline-none border-none bg-transparent" 
            (input)="onInput($event, hiddenInput)"
            (blur)="onBlur()"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
          />
          <div 
            class="relative bg-black border-[3px] border-black shadow-xl inline-block" 
            (click)="focusInput(hiddenInput)"
            (keydown.enter)="focusInput(hiddenInput)"
            tabindex="0"
            role="button"
            aria-label="Crossword Board"
          >
            @for (row of grid(); track $index) {
              <div class="flex">
                @for (cell of row; track cell.col) {
                  <app-crossword-cell
                    [cell]="cell"
                    [isActive]="isActive(cell.row, cell.col)"
                    [isHighlighted]="isHighlighted(cell.row, cell.col)"
                    (cellClick)="onCellClick($event.row, $event.col, hiddenInput)"
                  />
                }
              </div>
            }
          </div>
        </div>
      </mat-card-content>
    </mat-card>
