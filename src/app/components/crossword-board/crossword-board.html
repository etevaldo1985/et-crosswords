<div class="board-container">
  <div class="board-header">
    <h2 class="board-title">{{ puzzle()?.title }}</h2>
    <div class="board-stats">
      <div class="stat-item">
        <span class="stat-label">TIME</span>
        <span class="stat-value">{{ formatTime(timeElapsed()) }}</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">SCORE</span>
        <span class="stat-value" [ngClass]="{
          'text-easy': score() === 100,
          'text-medium': score() >= 50 && score() < 100,
          'text-hard': score() < 50
        }">{{ score() }}%</span>
      </div>
    </div>
  </div>

  @if (activeClue()) {
    <div class="active-clue-box">
      <div class="clue-badge">
        {{ activeClue()?.number }}{{ activeClue()?.direction === 'across' ? 'A' : 'D' }}
      </div>
      <span class="clue-text">{{ activeClue()?.text }}</span>
    </div>
  }

  <div class="grid-wrapper">
    <!-- Hidden input to trigger mobile keyboard -->
    <input 
      #hiddenInput
      type="text" 
      class="hidden-input" 
      (input)="onInput($event, hiddenInput)"
      (blur)="onBlur()"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    />
    <div 
      class="crossword-grid" 
      (click)="focusInput(hiddenInput)"
      (keydown.enter)="focusInput(hiddenInput)"
      tabindex="0"
      role="button"
      aria-label="Crossword Board"
    >
      @for (row of grid(); track $index) {
        <div class="grid-row">
          @for (cell of row; track cell.col) {
            <app-crossword-cell
              [cell]="cell"
              [isActive]="isActive(cell.row, cell.col)"
              [isHighlighted]="isHighlighted(cell.row, cell.col)"
              (cellClick)="onCellClick($event.row, $event.col, hiddenInput)"
            />
          }
        </div>
      }
    </div>
  </div>
</div>
