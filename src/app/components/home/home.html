<div class="game-shell">
  <!-- Scanline overlay -->
  <div class="scanlines" aria-hidden="true"></div>

  <!-- Header -->
  <header class="game-header">
    <div class="logo-block">
      <div class="logo-icon">
        <span class="logo-grid">
          <span></span><span></span>
          <span></span><span></span>
        </span>
      </div>
      <div class="logo-text">
        <span class="logo-title">WORDGRID</span>
        <span class="logo-sub">by ET</span>
      </div>
    </div>

    <div class="header-right">
      <div class="player-badge">
        <img [src]="user()?.picture" alt="Profile" class="player-avatar" />
        <div class="player-info">
          <span class="player-label">PLAYER</span>
          <span class="player-name">{{ user()?.name }}</span>
        </div>
      </div>
      <button mat-icon-button (click)="logout()" class="logout-btn" aria-label="Logout">
        <mat-icon>power_settings_new</mat-icon>
      </button>
    </div>
  </header>

  <main class="game-main">

    <!-- Hero -->
    <section class="hero-section">
      <div class="hero-bg-text" aria-hidden="true">WORDS</div>
      <h2 class="hero-headline">
        <span class="hero-line1">CHOOSE YOUR</span>
        <span class="hero-line2">CHALLENGE</span>
      </h2>
    </section>

    <!-- Controls Row -->
    <div class="controls-row">

      <!-- Language Toggle -->
      <div class="toggle-group" role="group" aria-label="Language">
        <button
          class="toggle-btn"
          [class.active]="selectedLanguage() === 'en'"
          (click)="selectLanguage('en')"
        >
          <span class="toggle-flag">🇺🇸</span> EN
        </button>
        <button
          class="toggle-btn"
          [class.active]="selectedLanguage() === 'pt'"
          (click)="selectLanguage('pt')"
        >
          <span class="toggle-flag">🇧🇷</span> PT
        </button>
      </div>

    </div>

    <!-- Difficulty Selector -->
    <div class="difficulty-strip">

      <button
        class="diff-card diff-easy"
        [class.selected]="selectedDifficulty() === 'easy'"
        (click)="selectDifficulty('easy')"
      >
        <div class="diff-glow"></div>
        <span class="diff-icon">★</span>
        <span class="diff-label">EASY</span>
        <span class="diff-size">7 × 7</span>
        <div class="diff-bar">
          <div class="diff-fill" style="width:33%"></div>
        </div>
      </button>

      <button
        class="diff-card diff-medium"
        [class.selected]="selectedDifficulty() === 'medium'"
        (click)="selectDifficulty('medium')"
      >
        <div class="diff-glow"></div>
        <span class="diff-icon">★★</span>
        <span class="diff-label">MEDIUM</span>
        <span class="diff-size">9 × 9</span>
        <div class="diff-bar">
          <div class="diff-fill" style="width:66%"></div>
        </div>
      </button>

      <button
        class="diff-card diff-hard"
        [class.selected]="selectedDifficulty() === 'hard'"
        (click)="selectDifficulty('hard')"
      >
        <div class="diff-glow"></div>
        <span class="diff-icon">★★★</span>
        <span class="diff-label">HARD</span>
        <span class="diff-size">11 × 11</span>
        <div class="diff-bar">
          <div class="diff-fill" style="width:100%"></div>
        </div>
      </button>

    </div>

    <!-- Puzzle Grid -->
    <section class="puzzle-section">

      @if (isLoading()) {
        <div class="loading-state">
          <div class="load-spinner">
            <span></span><span></span><span></span><span></span>
          </div>
          <p class="load-text">LOADING PUZZLES...</p>
        </div>
      } @else {
        <div class="puzzle-grid">

          <!-- Generate Card (Admin) -->
          @if (isAdmin()) {
            <button
              class="puzzle-card generate-card"
              [class.generating]="isGenerating()"
              (click)="!isGenerating() && generatePuzzle()"
            >
              <div class="gen-border-anim"></div>
              @if (isGenerating()) {
                <div class="gen-spinner">
                  <span></span><span></span><span></span>
                </div>
                <span class="gen-label">GENERATING...</span>
                <span class="gen-sub">AI is crafting your puzzle</span>
              } @else {
                <mat-icon class="gen-icon">auto_awesome</mat-icon>
                <span class="gen-label">GENERATE</span>
                <span class="gen-sub">AI-powered unique puzzle</span>
              }
            </button>
          }

          @for (puzzle of displayedPuzzles(); track puzzle.id) {
            <button class="puzzle-card play-card" (click)="playPuzzle(puzzle.id)">
              <div class="card-corner top-left"></div>
              <div class="card-corner top-right"></div>
              <div class="card-corner bottom-left"></div>
              <div class="card-corner bottom-right"></div>

              <div class="card-header-row">
                <span
                  class="diff-badge"
                  [ngClass]="{
                    'badge-easy': puzzle.difficulty === 'easy',
                    'badge-medium': puzzle.difficulty === 'medium',
                    'badge-hard': puzzle.difficulty === 'hard'
                  }"
                >{{ puzzle.difficulty | uppercase }}</span>
                <span class="size-badge">{{ puzzle.size }}</span>
              </div>

              <h3 class="card-title">{{ puzzle.title }}</h3>

              <div class="card-footer">
                <span class="play-label">PLAY NOW</span>
                <mat-icon class="play-arrow">arrow_forward</mat-icon>
              </div>
            </button>
          }

        </div>
      }
    </section>

  </main>
</div>
