<div class="game-shell">
  <!-- Scanline overlay -->
  <div class="scanlines" aria-hidden="true"></div>

  <!-- Header -->
  <header class="game-header">
    <div class="logo-block cursor-pointer" (click)="goBack()">
      <button mat-icon-button class="back-btn" aria-label="Back to Home">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <div class="logo-text ml-2 hidden sm:flex">
        <span class="logo-title">WORDGRID</span>
        <span class="logo-sub">by ET</span>
      </div>
    </div>

    <div class="header-center">
      <h1 class="game-title">PLAYING PUZZLE</h1>
    </div>

    <div class="header-right">
      <div class="player-badge">
        <img [src]="user()?.picture" alt="Profile" class="player-avatar" />
        <div class="player-info hidden sm:flex">
          <span class="player-label">PLAYER</span>
          <span class="player-name">{{ user()?.name }}</span>
        </div>
      </div>
    </div>
  </header>

  <main class="game-main">
    <div class="game-layout">
      <!-- Left Column: Board & Controls -->
      <div class="game-board-col">
        <app-crossword-board class="w-full"></app-crossword-board>
        <app-game-controls class="w-full mt-6"></app-game-controls>
      </div>

      <!-- Right Column: Clues -->
      <div class="game-clues-col">
        <app-clue-list class="w-full h-full"></app-clue-list>
      </div>
    </div>
  </main>
</div>
