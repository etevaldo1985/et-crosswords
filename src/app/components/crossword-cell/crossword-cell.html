    <div
      role="button"
      tabindex="0"
      class="relative w-10 h-10 sm:w-12 sm:h-12 border border-black flex items-center justify-center select-none cursor-pointer transition-colors duration-200"
      [ngClass]="{
        'bg-black': cell().isBlocked,
        'bg-white': !cell().isBlocked && !isActive() && !isHighlighted(),
        'bg-yellow-200': isActive(),
        'bg-blue-100': isHighlighted() && !isActive(),
        'text-green-600 font-bold': cell().isCorrect,
        'text-red-600 font-bold': cell().isWrong,
        'text-black': !cell().isCorrect && !cell().isWrong
      }"
      (click)="onClick()"
      (keydown.enter)="onClick()"
      (keydown.space)="onClick()"
    >
      @if (!cell().isBlocked && cell().clueNumber) {
        <span class="absolute top-0.5 left-1 text-[10px] leading-none text-black font-sans font-medium">
          {{ cell().clueNumber }}
        </span>
      }
      @if (!cell().isBlocked) {
        <span class="text-xl sm:text-2xl font-sans font-bold uppercase">
          {{ cell().letter }}
        </span>
      }
    </div>
