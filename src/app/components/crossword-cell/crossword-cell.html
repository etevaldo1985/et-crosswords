<div
  role="button"
  tabindex="0"
  class="cell-container"
  [ngClass]="{
    'is-blocked': cell().isBlocked,
    'is-active': isActive(),
    'is-highlighted': isHighlighted() && !isActive(),
    'is-correct': cell().isCorrect,
    'is-wrong': cell().isWrong
  }"
  (click)="onClick()"
  (keydown.enter)="onClick()"
  (keydown.space)="onClick()"
>
  @if (!cell().isBlocked && cell().clueNumber) {
    <span class="clue-number">
      {{ cell().clueNumber }}
    </span>
  }
  @if (!cell().isBlocked) {
    <span class="cell-letter">
      {{ cell().letter }}
    </span>
  }
</div>
