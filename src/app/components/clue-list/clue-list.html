<div class="clues-container">
  <!-- Across Clues -->
  <div class="clue-section">
    <h3 class="clue-title">ACROSS</h3>
    <div class="clue-list custom-scrollbar">
      @for (clue of acrossClues(); track clue.id) {
        <button 
          class="clue-item"
          [ngClass]="{
            'is-active': isActiveClue(clue.id)
          }"
          (click)="onClueClick(clue.row, clue.col, 'across')"
        >
          <span class="clue-number">{{ clue.number }}</span>
          <span class="clue-text">{{ clue.text }}</span>
        </button>
      }
    </div>
  </div>

  <!-- Down Clues -->
  <div class="clue-section">
    <h3 class="clue-title">DOWN</h3>
    <div class="clue-list custom-scrollbar">
      @for (clue of downClues(); track clue.id) {
        <button 
          class="clue-item"
          [ngClass]="{
            'is-active': isActiveClue(clue.id)
          }"
          (click)="onClueClick(clue.row, clue.col, 'down')"
        >
          <span class="clue-number">{{ clue.number }}</span>
          <span class="clue-text">{{ clue.text }}</span>
        </button>
      }
    </div>
  </div>
</div>
