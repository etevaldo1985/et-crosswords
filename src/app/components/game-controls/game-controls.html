    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 my-8 w-full max-w-2xl mx-auto p-6 bg-white rounded-2xl shadow-sm border border-slate-100">
      <button 
        mat-flat-button 
        class="!bg-emerald-600 !text-white !rounded-xl !px-8 !py-6"
        (click)="onVerify()"
      >
        <mat-icon>check_circle</mat-icon>
        Verify Answers
      </button>

      <button 
        mat-stroked-button
        class="!rounded-xl !px-8 !py-6"
        (click)="onRestart()"
      >
        <mat-icon>refresh</mat-icon>
        Restart Game
      </button>
      
      @if (isVerified()) {
        <div class="ml-auto flex items-center gap-2 px-4 py-2 bg-slate-50 rounded-lg border border-slate-200">
          <span class="text-slate-500 font-medium text-sm uppercase tracking-wider">Score</span>
          <span 
            class="text-2xl font-bold font-mono"
            [ngClass]="{
              'text-emerald-600': score() === 100,
              'text-amber-500': score() >= 50 && score() < 100,
              'text-red-500': score() < 50
            }"
          >
            {{ score() }}%
          </span>
        </div>
      }
    </div>
