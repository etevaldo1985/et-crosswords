<div class="controls-container">
  <button 
    class="arcade-btn verify-btn"
    (click)="onVerify()"
  >
    <mat-icon>check_circle</mat-icon>
    <span class="btn-text">VERIFY</span>
  </button>

  <button 
    class="arcade-btn restart-btn"
    (click)="onRestart()"
  >
    <mat-icon>refresh</mat-icon>
    <span class="btn-text">RESTART</span>
  </button>
  
  @if (isVerified()) {
    <div class="score-badge">
      <span class="score-label">SCORE</span>
      <span 
        class="score-value"
        [ngClass]="{
          'text-easy': score() === 100,
          'text-medium': score() >= 50 && score() < 100,
          'text-hard': score() < 50
        }"
      >
        {{ score() }}%
      </span>
    </div>
  }
</div>
