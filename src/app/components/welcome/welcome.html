<div class="game-shell">
  <!-- Scanline overlay -->
  <div class="scanlines" aria-hidden="true"></div>

  <div class="min-h-[100vh] flex flex-col items-center justify-center p-4 text-center relative z-10">
    <div class="welcome-card">
      <div class="logo-icon welcome-logo">
        <span class="logo-grid">
          <span></span><span></span>
          <span></span><span></span>
        </span>
      </div>
      
      <h1 class="welcome-title">WORDGRID</h1>
      <p class="welcome-subtitle">AI-POWERED CROSSWORDS</p>
      
      <p class="welcome-desc">Challenge your mind with our daily puzzles. Easy, medium, and hard levels available.</p>
      
      <button 
        class="arcade-btn"
        (click)="login()"
        [disabled]="isLoggingIn()"
      >
        @if (isLoggingIn()) {
          <div class="gen-spinner">
            <span></span><span></span><span></span>
          </div>
          <span class="btn-text">SIGNING IN...</span>
        } @else {
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google Logo" class="google-icon" />
          <span class="btn-text">CONTINUE WITH GOOGLE</span>
        }
      </button>

      @if (loginError()) {
        <div class="error-box">
          <mat-icon class="error-icon">error_outline</mat-icon>
          <span>{{ loginError() }}</span>
        </div>
      }
    </div>
  </div>
</div>
